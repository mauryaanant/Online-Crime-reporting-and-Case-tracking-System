<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Contact | Crime Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        .card-box {
            background: rgba(255,255,255,0.08);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        input, textarea {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

<div class="container py-5">

    <h2 class="text-center mb-4">Contact Us</h2>

    <div class="card-box">

        <form>
            <input type="text" class="form-control mb-3" placeholder="Your Name">
            <input type="email" class="form-control mb-3" placeholder="Your Email">
            <textarea class="form-control mb-3" rows="4" placeholder="Your Message"></textarea>

            <button class="btn btn-danger w-100">Send Message</button>
        </form>

        <div class="text-center mt-3">
            <a href="/" class="btn btn-outline-light">← Back to Home</a>
        </div>

    </div>

</div>

<footer>
    © 2026 Crime Portal
</footer>

</body>
</html>
