<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- 🔥 HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white shadow-sm rounded">

        <div>
            <h4 class="mb-0 fw-bold">👤 Admin Profile</h4>
            <small class="text-muted">Manage your account details</small>
        </div>

        <div class="d-flex gap-2">
            <a href="/admin/dashboard" class="btn btn-outline-primary btn-sm">🏠 Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>

    </div>

    <!-- 🔥 PROFILE CARD -->
    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-sm border-0">

                <!-- Avatar Section -->
                <div class="text-center mt-4">
                    <div class="rounded-circle bg-dark text-white d-inline-flex align-items-center justify-content-center"
                         style="width:80px; height:80px; font-size:30px;">
                        <span th:text="${admin.name.substring(0,1)}"></span>
                    </div>
                    <h5 class="mt-2" th:text="${admin.name}"></h5>
                    <p class="text-muted" th:text="${admin.role}"></p>
                </div>

                <!-- Details -->
                <div class="card-body">

                    <div class="mb-3">
                        <label class="form-label fw-bold">User ID</label>
                        <input type="text" class="form-control" th:value="${admin.id}" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="text" class="form-control" th:value="${admin.email}" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Phone</label>
                        <input type="text" class="form-control" th:value="${admin.phone}" readonly>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
