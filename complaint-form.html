<%@ taglib prefix="c" uri="http://java.sun.com/jsp/jstl/core" %>
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>File Complaint | Crime Portal</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .form-card {
            background: rgba(255,255,255,0.08);
			
			
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .form-control, .form-select {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
        }
		.form-select option {
		    color: black;
			background: aliceblue;
		}

        .form-control::placeholder {
            color: #ccc;
        }

        .btn-main {
            background: #e63946;
            border-radius: 30px;
            border: none;
        }

        .btn-main:hover {
            background: #c1121f;
        }

        .alert {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-7">
			<div class="mb-3 text-end">
								    <a href="/" class="btn btn-outline-light btn-sm">
								        ← Back to Home
								    </a>
								</div>
            <div class="form-card">

                <h2 class="text-center mb-4">Register Complaint</h2>

                <!-- 🔥 ERROR MESSAGE -->
                <div th:if="${error}" class="alert alert-danger text-center">
                    Something went wrong. Please try again.
                </div>

				
                <form th:action="@{/submitComplaint}" 
                      th:object="${complaint}"
                      method="post" 
                      enctype="multipart/form-data">

                    <!-- 🔹 Title -->
                    <div class="mb-3">
                        <label class="form-label">Complaint Title</label>
                        <input type="text" th:field="*{title}" class="form-control" placeholder="Enter title" required>
                    </div>

                    <!-- 🔹 Description -->
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea th:field="*{description}" class="form-control" rows="4"
                                  placeholder="Describe the incident..." required></textarea>
                    </div>

                    <!-- 🔹 Category -->
					<div class="mb-3">
					    <label class="form-label">Category</label>

					    <select th:field="*{category}" class="form-select" required>

					        <option value="">Select Category</option>

					        <option value="Cyber Crime">Cyber Crime</option>
					        <option value="Theft">Theft</option>
					        <option value="Fraud">Fraud</option>
					        <option value="Traffic">Traffic</option>
					        <option value="Harassment">Harassment</option>

					    </select>
					</div>

                    <!-- 🔹 Department -->
                    <div class="mb-3">
                        <label class="form-label">Department</label>
                        <select name="departmentId" class="form-select" required>

                            <option value="">Select Department</option>

                            <option th:each="d : ${departments}"
                                    th:value="${d.id}"
                                    th:text="${d.name}">
                            </option>

                        </select>
                    </div>

                    <!-- 🔹 Evidence Upload -->
                    <div class="mb-3">
                        <label class="form-label">Upload Evidence</label>
                        <input type="file" name="file" class="form-control"
                               accept="image/*,application/pdf">
                    </div>

                    <!-- 🔹 Submit -->
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-main">
                            Submit Complaint
                        </button>
                    </div>
					
					

                </form>

            </div>

        </div>
    </div>

</div>

</body>
</html>
