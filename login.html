<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | Crime Portal</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            height: 100vh;
            color: white;
        }

        .login-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .form-control {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #ccc;
        }

        .btn-main {
            background: #e63946;
            border-radius: 30px;
            border: none;
        }

        .btn-main:hover {
            background: #c1121f;
        }

        .btn-outline-light {
            border-radius: 30px;
        }

        a {
            color: #ddd;
            text-decoration: none;
        }

        a:hover {
            color: white;
        }
    </style>
</head>

<body>

<div class="container h-100 d-flex justify-content-center align-items-center">
    <div class="col-md-4">

        <div class="login-card text-center">

            <h3 class="mb-3">Welcome Back</h3>
            <p class="mb-4" style="opacity: 0.8;">Login to continue</p>

            <!-- 🔴 ERROR -->
            <div th:if="${param.error}" class="alert alert-danger">
                Invalid email or password
            </div>

            <form th:action="@{/login}" method="post">

                <!-- Email -->
                <input type="email" name="email" class="form-control my-3"
                       placeholder="Enter your email" required>

                <!-- Password -->
                <input type="password" name="password" class="form-control my-2"
                       placeholder="Enter your password" required>

                <!-- Login Button -->
                <button class="btn btn-main w-100 mt-3">Login</button>
            </form>

            <!-- Links -->
            <div class="mt-4">
                <a href="/register">Create Account</a>
            </div>

            <!-- 🔥 Back to Home Button -->
            <div class="mt-3">
                <a href="/" class="btn btn-outline-light w-100">
                    ← Back to Home
                </a>
            </div>

        </div>

    </div>
</div>

</body>
</html>
