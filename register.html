<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register | Crime Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
        }

        .btn-main {
            background: #e63946;
            border-radius: 30px;
        }
    </style>
</head>

<body>

<div class="container h-100 d-flex justify-content-center align-items-center">
    <div class="col-md-5">

        <div class="card text-center">
            <h3>Create Account</h3>

            <form action="/register" method="post">

                <input type="text" name="name" class="form-control my-2" placeholder="Name" required>

                <input type="email" name="email" class="form-control my-2" placeholder="Email" required>
				
				<input type="password" name="password" class="form-control my-2" placeholder="Password" required>

                <input type="text" name="phone" class="form-control my-2" placeholder="Phone">

                <button class="btn btn-main w-100 mt-3">Register</button>
            </form>

            <p class="mt-3">
                <a href="/login">Already have an account?</a>
            </p>
        </div>

    </div>
</div>

</body>
</html>
