<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Success | Crime Portal</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            height: 100vh;
            color: white;
        }

        .success-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .btn-main {
            background: #e63946;
            border-radius: 30px;
            border: none;
        }

        .btn-outline-light {
            border-radius: 30px;
        }
    </style>
</head>

<body>

<div class="container h-100 d-flex justify-content-center align-items-center">

    <div class="col-md-6">

        <div class="success-card">

            <h2 class="mb-3">✅ Complaint Submitted</h2>

            <p class="mb-3">Your complaint has been successfully registered.</p>

            <h5 class="mb-4">
                Tracking ID:
                <span style="color:#e63946;" th:text="${complaintId}"></span>
            </h5>

            <!-- Buttons -->
            <div class="d-grid gap-3">

                <a href="/" class="btn btn-outline-light">
                    ← Back to Home
                </a>

                <a href="/complaint" class="btn btn-main">
                    File Another Complaint
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
